version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://runflow:runflow@db:5432/runflow
      - REDIS_URL=redis://cache:6379
    depends_on:
      - db
      - cache

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=runflow
      - POSTGRES_PASSWORD=runflow
      - POSTGRES_DB=runflow
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine

  runner:
    build: ./runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
