version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgres://runflow:password@db:5432/runflow}
      - REDIS_URL=${REDIS_URL:-redis://cache:6379}
    depends_on:
      - db
      - cache

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-runflow}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB=${POSTGRES_DB:-runflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine

  runner:
    build: ./runner
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres_data:
